<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website with Bulleted Lists</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('your-background-image.jpg'); /* Replace with your background image URL */
            background-size: cover;
            background-repeat: no-repeat;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column; /* Align content in a column */
            align-items: center; /* Center align content horizontally */
            min-height: 100vh; /* Ensure the content takes up the full viewport height */
        }

        /* Styling for the headings */
        h1 {
            font-weight: bold;
            text-decoration: underline;
            margin-top: 20px;
            text-align: center; /* Center align the headings */
        }

        /* Styling for the container divs */
        .section {
            background-color: rgba(173, 216, 230, 0.5); /* Light blue transparent background */
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
            text-align: center; /* Center align the content within each section */
        }

        /* Styling for the lists */
        ul {
            list-style-type: disc;
            padding-left: 20px;
        }

        /* Style for the cross button */
        .cross-button {
            position: absolute;
            top: 10px; /* Adjust the position as needed */
            right: 10px; /* Adjust the position as needed */
            font-size: 1.5em;
            text-decoration: none;
            color: #333; /* Cross button color */
            cursor: pointer;
        }

        .cross-button:hover {
            color: #ff0000; /* Cross button color on hover */
        }

    </style>
</head>
<body>
    <span class="cross-button" onclick="goBack()">&#10006;</span>

    <div class="section">
        <h1>Publications</h1>
        <ul>
            <li>Publication 1</li>
            <li>Publication 2</li>
            <li>Publication 3</li>
            <!-- Add more publications here -->
        </ul>
    </div>

    <div class="section">
        <h1>Articles</h1>
        <ul>
            <li>Article 1</li>
            <li>Article 2</li>
            <li>Article 3</li>
            <!-- Add more articles here -->
        </ul>
    </div>

    <div class="section">
        <h1>Research</h1>
        <ul>
            <li>Research Project 1</li>
            <li>Research Project 2</li>
            <li>Research Project 3</li>
            <!-- Add more research projects here -->
        </ul>
    </div>

    <!-- Back button element -->

    <script>
        // JavaScript function to go back one step in the browser history
        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
