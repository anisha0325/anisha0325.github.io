<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website with Bulleted Lists</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0; /* Background color for the page */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center; /* Center align content horizontally */
            align-items: center; /* Center align content vertically */
            min-height: 100vh; /* Ensure the content takes up the full viewport height */
        
        }

        /* Styling for the headings */
        h1 {
            font-weight: bold;
            text-decoration: underline;
            margin-top: 20px;
            text-align: center; /* Center align the headings */

        }

        /* Styling for the container divs */
        .section {
            background-color: rgba(173, 216, 230, 0.5); /* Light blue transparent background */
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
            text-align: center; /* Center align the content within each section */

        }

        /* Styling for the lists */
        ul {
            list-style-type: disc;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="section">
        <h1>Publications</h1>
        <ul>
            <li>Publication 1</li>
            <li>Publication 2</li>
            <li>Publication 3</li>
            <!-- Add more publications here -->
        </ul>
    </div>

    <div class="section">
        <h1>Articles</h1>
        <ul>
            <li>Article 1</li>
            <li>Article 2</li>
            <li>Article 3</li>
            <!-- Add more articles here -->
        </ul>
    </div>

    <div class="section">
        <h1>Research</h1>
        <ul>
            <li>Research Project 1</li>
            <li>Research Project 2</li>
            <li>Research Project 3</li>
            <!-- Add more research projects here -->
        </ul>
    </div>
    <!-- Back button element -->
    <div class="back-button" onclick="goBack()">&#10006; Go Back</div>

    <script>
        // JavaScript function to go back to the previous page
        function goBack() {
            window.history.back();
        }
    </script>
</body>
</html>
