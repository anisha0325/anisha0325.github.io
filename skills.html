<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills and Hobbies</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0; /* Background color for the page */
            margin: 0;
            padding: 0;
        }

        /* Styling for the container divs */
        .container {
            display: flex;
        }

        /* Styling for the left and right boxes */
        .box {
            flex: 1;
            background-color: rgba(173, 216, 230, 0.5); /* Light blue transparent background */
            padding: 20px;
            border-radius: 10px;
            margin: 20px;
        }

        /* Styling for headings */
        h1 {
            font-weight: bold;
            text-decoration: underline;
        }

        /* Styling for sections */
        ul {
            list-style-type: disc;
            padding-left: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">
            <h1>Skills</h1>
            <ul>
                <li>Languages</li>
                <li>Coding</li>
                <li>Tools</li>
                <li>Misc</li>
            </ul>
        </div>
        <div class="box">
            <h1>Hobbies</h1>
            <!-- Add hobbies or content here -->
        </div>
    </div>
</body>
</html>
