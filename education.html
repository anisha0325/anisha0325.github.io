<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Transitioning Bullet Points with Background Image</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url('background-white.png'); /* Replace 'your-background-image.jpg' with your image file */
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        ul {
            list-style-type: disc;
            padding: 0;
        }

        li {
            opacity: 0;
            transform: translateX(-20px);
            transition: opacity 0.5s ease-in, transform 0.5s ease-in;
            margin-bottom: 10px; /* Adjust the margin to control the space between bullets */
        }


        .list-item-1 {
            transition-delay: 0.5s;
        }

        .list-item-2 {
            transition-delay: 1s;
        }

        .list-item-3 {
            transition-delay: 1.5s;
        }

        .list-item-4 {
            transition-delay: 2s;
        }

        /* Add more list items and adjust the transition delays as needed */

        .visible {
            opacity: 1;
            transform: translateX(0);
        }
    </style>
</head>
<body>
    <ul>
        <li class="list-item-1"><strong>Degree : </strong>Master's of Science (MSc.) in Data Science<br><strong>Institution : </strong> Chennai Mathematical Institute (CMI) <br> <strong>Tenure : </strong>2020-2022</li>
        <li class="list-item-2">Item 2</li>
        <li class="list-item-3">Item 3</li>
        <li class="list-item-4">Item 4</li>
        <!-- Add more list items here -->
    </ul>

    <script>
        // JavaScript to add the 'visible' class to each list item with a delay
        const listItems = document.querySelectorAll('li');
        listItems.forEach((item, index) => {
            setTimeout(() => {
                item.classList.add('visible');
            }, index * 500); // Adjust the delay (in milliseconds) between each item
        });
    </script>
</body>
</html>
